<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Vote App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      background: #f0f2f5;
      color: #333;
    }

    header {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      text-align: center;
      padding: 2rem 1rem;
    }

    header h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
    header p { color: rgba(255,255,255,0.7); font-size: 0.95rem; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    /* Form */
    .form-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 2rem;
    }

    .form-card h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: #1e293b;
    }

    .form-group { margin-bottom: 1rem; }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 0.3rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #3b82f6;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 70px;
    }

    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover { background: #2563eb; }

    /* Stats */
    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .stats h2 {
      font-size: 1.1rem;
      color: #1e293b;
    }

    .stats span {
      font-size: 0.85rem;
      color: #94a3b8;
    }

    /* Idea cards */
    .ideas-list { display: flex; flex-direction: column; gap: 1rem; }

    .idea-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.3rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      transition: transform 0.2s, box-shadow 0.2s;
      border-left: 4px solid #e2e8f0;
    }

    .idea-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .idea-card.popular { border-left-color: #f59e0b; background: #fffbeb; }
    .idea-card.hot { border-left-color: #ef4444; background: #fef2f2; }
    .idea-card.top { border-left-color: #8b5cf6; background: linear-gradient(135deg, #faf5ff, #f3e8ff); }

    .vote-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 56px;
      flex-shrink: 0;
    }

    .vote-count {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      line-height: 1;
    }

    .idea-card.popular .vote-count { color: #d97706; }
    .idea-card.hot .vote-count { color: #dc2626; }
    .idea-card.top .vote-count { color: #7c3aed; }

    .btn-vote {
      margin-top: 0.4rem;
      padding: 0.35rem 0.7rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.15s;
      line-height: 1;
    }

    .btn-vote:hover {
      background: #eff6ff;
      border-color: #3b82f6;
      transform: scale(1.15);
    }

    .btn-vote:active { transform: scale(0.95); }

    .idea-content { flex: 1; min-width: 0; }

    .idea-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 0.3rem;
      word-break: break-word;
    }

    .idea-desc {
      font-size: 0.9rem;
      color: #64748b;
      line-height: 1.5;
      word-break: break-word;
    }

    .idea-meta {
      font-size: 0.75rem;
      color: #94a3b8;
      margin-top: 0.5rem;
    }

    .idea-delete {
      background: none;
      border: none;
      color: #cbd5e1;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem;
      transition: color 0.2s;
      flex-shrink: 0;
      align-self: flex-start;
    }

    .idea-delete:hover { color: #ef4444; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #94a3b8;
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 0.5rem; }

    .rank-badge {
      font-size: 0.7rem;
      font-weight: 700;
      color: #fff;
      background: #94a3b8;
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      margin-bottom: 0.3rem;
      display: inline-block;
    }

    .idea-card.top .rank-badge { background: #7c3aed; }
    .idea-card.hot .rank-badge { background: #ef4444; }
    .idea-card.popular .rank-badge { background: #f59e0b; }

    @media (max-width: 480px) {
      header h1 { font-size: 1.4rem; }
      .idea-card { padding: 1rem; gap: 0.8rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Idea Vote</h1>
    <p>チームのアイデアを投稿して投票しよう</p>
  </header>

  <div class="container">
    <div class="form-card">
      <h2>アイデアを投稿</h2>
      <div class="form-group">
        <label for="title">タイトル *</label>
        <input type="text" id="title" placeholder="例: AIチャットボットで社内FAQ自動化">
      </div>
      <div class="form-group">
        <label for="desc">説明</label>
        <textarea id="desc" placeholder="アイデアの詳細を書いてください..."></textarea>
      </div>
      <button class="btn-submit" onclick="addIdea()">投稿する</button>
    </div>

    <div class="stats">
      <h2>アイデア一覧</h2>
      <span id="idea-count"></span>
    </div>

    <div class="ideas-list" id="ideas-list"></div>
    <div class="empty-state" id="empty-state">
      <div class="icon">💡</div>
      <p>まだアイデアがありません。<br>最初のアイデアを投稿しましょう！</p>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'vote-app-ideas';

    function loadIdeas() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch { return []; }
    }

    function saveIdeas(ideas) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getCardClass(votes, rank) {
      if (rank === 1 && votes > 0) return 'top';
      if (votes >= 10) return 'hot';
      if (votes >= 5) return 'popular';
      return '';
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function render() {
      const ideas = loadIdeas().sort((a, b) => b.votes - a.votes);
      const list = document.getElementById('ideas-list');
      const empty = document.getElementById('empty-state');
      const count = document.getElementById('idea-count');

      count.textContent = ideas.length ? `${ideas.length} 件のアイデア` : '';

      if (!ideas.length) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';

      list.innerHTML = ideas.map((idea, i) => {
        const rank = i + 1;
        const cls = getCardClass(idea.votes, rank);
        const desc = idea.desc ? `<p class="idea-desc">${escapeHtml(idea.desc)}</p>` : '';
        return `
          <div class="idea-card ${cls}">
            <div class="vote-section">
              <span class="rank-badge">#${rank}</span>
              <span class="vote-count">${idea.votes}</span>
              <button class="btn-vote" onclick="vote('${idea.id}')" title="いいね">👍</button>
            </div>
            <div class="idea-content">
              <div class="idea-title">${escapeHtml(idea.title)}</div>
              ${desc}
              <div class="idea-meta">${formatTime(idea.createdAt)}</div>
            </div>
            <button class="idea-delete" onclick="deleteIdea('${idea.id}')" title="削除">&times;</button>
          </div>
        `;
      }).join('');
    }

    function addIdea() {
      const titleEl = document.getElementById('title');
      const descEl = document.getElementById('desc');
      const title = titleEl.value.trim();
      const desc = descEl.value.trim();

      if (!title) {
        alert('タイトルを入力してください');
        titleEl.focus();
        return;
      }

      const ideas = loadIdeas();
      ideas.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        title,
        desc,
        votes: 0,
        createdAt: Date.now()
      });
      saveIdeas(ideas);

      titleEl.value = '';
      descEl.value = '';
      titleEl.focus();
      render();
    }

    function vote(id) {
      const ideas = loadIdeas();
      const idea = ideas.find(i => i.id === id);
      if (idea) {
        idea.votes++;
        saveIdeas(ideas);
        render();
      }
    }

    function deleteIdea(id) {
      const ideas = loadIdeas().filter(i => i.id !== id);
      saveIdeas(ideas);
      render();
    }

    document.getElementById('title').addEventListener('keydown', e => {
      if (e.key === 'Enter') addIdea();
    });

    render();
  </script>

</body>
</html>
