<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Self-Introduction Card Maker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      color: #fff;
      font-size: 2rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.85);
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    /* Form */
    .form-container {
      max-width: 520px;
      margin: 0 auto 3rem;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #667eea;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.45);
    }

    .btn:active {
      transform: translateY(0);
    }

    /* Cards grid */
    .cards-section-title {
      text-align: center;
      color: #fff;
      font-size: 1.3rem;
      margin-bottom: 1.2rem;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    /* Card */
    .card {
      position: relative;
      border-radius: 16px;
      padding: 1.8rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeIn 0.4s ease;
    }

    .card-delete {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.15);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      line-height: 1;
    }

    .card-delete:hover {
      background: rgba(220, 38, 38, 0.8);
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.18);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 0.8rem;
    }

    .card-name {
      font-size: 1.4rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 0.3rem;
    }

    .card-role {
      font-size: 0.9rem;
      color: #667eea;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .card-detail {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .card-detail span {
      font-weight: 600;
      color: #333;
    }

    .card-message {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      background: linear-gradient(135deg, #f5f3ff, #ede9fe);
      border-radius: 10px;
      font-size: 0.95rem;
      color: #4c1d95;
      line-height: 1.5;
      font-style: italic;
    }

    .empty-state {
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
      font-size: 1rem;
      padding: 2rem;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 1rem 0.5rem; }
      h1 { font-size: 1.5rem; }
      .form-container { padding: 1.5rem; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <h1>Self-Introduction Card Maker</h1>
  <p class="subtitle">チームメンバーの自己紹介カードを作ろう</p>

  <div class="form-container">
    <div class="form-group">
      <label for="name">名前 *</label>
      <input type="text" id="name" placeholder="例: 関根 涼太">
    </div>
    <div class="form-group">
      <label for="role">役職・担当</label>
      <input type="text" id="role" placeholder="例: フロントエンドエンジニア">
    </div>
    <div class="form-group">
      <label for="hobby">趣味</label>
      <input type="text" id="hobby" placeholder="例: キャンプ、ギター">
    </div>
    <div class="form-group">
      <label for="food">好きな食べ物</label>
      <input type="text" id="food" placeholder="例: ラーメン、寿司">
    </div>
    <div class="form-group">
      <label for="message">ひとことメッセージ</label>
      <textarea id="message" placeholder="例: よろしくお願いします！"></textarea>
    </div>
    <button class="btn" onclick="createCard()">カードを作成</button>
  </div>

  <div id="cards-wrapper" style="display:none;">
    <p class="cards-section-title">みんなのカード</p>
    <div class="cards-grid" id="cards-grid"></div>
  </div>

  <div class="empty-state" id="empty-state">まだカードがありません。上のフォームから作成してみましょう！</div>

  <script>
    const icons = ['😊','🎯','🚀','💡','🎨','🌟','🔥','💻','🎵','🏕️','⚡','🌈','🐱','🍀','✨'];
    const cardColors = [
      'linear-gradient(135deg, #fdf2f8, #fce7f3)',
      'linear-gradient(135deg, #eff6ff, #dbeafe)',
      'linear-gradient(135deg, #f0fdf4, #dcfce7)',
      'linear-gradient(135deg, #fefce8, #fef9c3)',
      'linear-gradient(135deg, #faf5ff, #f3e8ff)',
      'linear-gradient(135deg, #fff7ed, #ffedd5)',
      'linear-gradient(135deg, #f0fdfa, #ccfbf1)',
      'linear-gradient(135deg, #fdf4ff, #fae8ff)',
    ];

    function createCard() {
      const name = document.getElementById('name').value.trim();
      const role = document.getElementById('role').value.trim();
      const hobby = document.getElementById('hobby').value.trim();
      const food = document.getElementById('food').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!name) {
        alert('名前を入力してください');
        document.getElementById('name').focus();
        return;
      }

      const icon = icons[Math.floor(Math.random() * icons.length)];
      const bgColor = cardColors[Math.floor(Math.random() * cardColors.length)];

      const card = document.createElement('div');
      card.className = 'card';
      card.style.background = bgColor;

      let html = `<button class="card-delete" onclick="deleteCard(this)" title="削除">&times;</button>`;
      html += `<div class="card-icon">${icon}</div>`;
      html += `<div class="card-name">${escapeHtml(name)}</div>`;
      if (role) html += `<div class="card-role">${escapeHtml(role)}</div>`;
      if (hobby) html += `<div class="card-detail"><span>趣味:</span> ${escapeHtml(hobby)}</div>`;
      if (food) html += `<div class="card-detail"><span>好きな食べ物:</span> ${escapeHtml(food)}</div>`;
      if (message) html += `<div class="card-message">"${escapeHtml(message)}"</div>`;

      card.innerHTML = html;

      const grid = document.getElementById('cards-grid');
      grid.prepend(card);

      document.getElementById('cards-wrapper').style.display = 'block';
      document.getElementById('empty-state').style.display = 'none';

      // Reset form
      document.getElementById('name').value = '';
      document.getElementById('role').value = '';
      document.getElementById('hobby').value = '';
      document.getElementById('food').value = '';
      document.getElementById('message').value = '';
      document.getElementById('name').focus();
    }

    function deleteCard(btn) {
      const card = btn.closest('.card');
      card.style.transition = 'opacity 0.3s, transform 0.3s';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.9)';
      setTimeout(() => {
        card.remove();
        const grid = document.getElementById('cards-grid');
        if (!grid.children.length) {
          document.getElementById('cards-wrapper').style.display = 'none';
          document.getElementById('empty-state').style.display = 'block';
        }
      }, 300);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Enter key support
    document.querySelectorAll('.form-container input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') createCard();
      });
    });
  </script>

</body>
</html>
